<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Web Serial Terminal</title>

<style>

body{
font-family:'Courier New', Courier, monospace;
background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
color:#fff;
margin:0;
padding:0;
text-align:center;
}

/* Title */
h1{
color:#00ffc3;
margin:10px 0;
text-shadow:0 0 10px #00ffc3;
}

/* Main container */
.container{
max-width:800px;
margin:20px auto;
padding:20px;
background:linear-gradient(145deg,#1b1b1b,#111);
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,200,0.4);
position:relative;
}

/* Terminal */
.terminal{
width:100%;
height:300px;
background:#000;
color:#00ff90;
padding:10px;
border-radius:6px;
overflow-y:auto;
text-align:left;
font-size:14px;
line-height:1.5;
border:1px solid #00ffc3;
white-space:pre-wrap;
box-shadow:inset 0 0 10px rgba(0,255,120,0.6);
}

/* Command input */
.command-input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #00ffc3;
background:#111;
color:#fff;
font-size:16px;
margin-top:10px;
outline:none;
}

.command-input:focus{
box-shadow:0 0 10px #00ffc3;
}

/* Suggestions */
.suggestions{
position:absolute;
width:100%;
background:#111;
border:1px solid #00ffc3;
color:white;
max-height:150px;
overflow-y:auto;
border-radius:6px;
display:none;
text-align:left;
}

.suggestion{
padding:10px;
cursor:pointer;
}

.suggestion:hover{
background:#00ffc3;
color:black;
}

/* Buttons */
button{
background:linear-gradient(90deg,#00ffc3,#00a8ff);
color:black;
padding:10px 15px;
font-size:16px;
border-radius:6px;
border:none;
cursor:pointer;
margin-top:10px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00ffc3;
}

/* Made By */
.made-by{
color:#ff006a;
font-size:18px;
font-weight:bold;
margin-top:10px;
text-shadow:0 0 8px #ff006a;
}

/* Credit */
.credit{
background:linear-gradient(90deg,#ff00cc,#3333ff,#00ffc3);
-webkit-background-clip:text;
color:transparent;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

</style>
</head>

<body>

<h1>ESP32 Web Serial Terminal</h1>

<div class="made-by">Made By @cyber_specterz</div>
<div class="credit">All Credit ESP32Marauder Team</div>

<div class="container">

<button onclick="connectSerial()">Connect to ESP32</button>

<div id="terminal" class="terminal">Waiting for connection...</div>

<div class="command-container">
<input type="text" id="commandInput" class="command-input" placeholder="Type a command..." oninput="showSuggestions()" onkeypress="handleKeyPress(event)">
<div id="suggestions" class="suggestions"></div>
</div>

<button onclick="sendCommand()">Send Command</button>

</div>

<script>

let port;
let writer;
let reader;
let decoder = new TextDecoder();
let encoder = new TextEncoder();

const commandList = [
"help","scanap","stopscan","list -a","save -a 0",
"evilportal -c start","clearlist -a","attack -t deauth",
"blespam -t all","sniffraw","select -a",
"evilportal -c start -w apple.html",
"evilportal -c start -w Better_Google_Mobile.html",
"ssid -a -n Linuxndroid","reboot","select -s","ls /",
];

async function connectSerial(){
try{

port = await navigator.serial.requestPort();
await port.open({ baudRate:115200 });

writer = port.writable.getWriter();
reader = port.readable.getReader();

updateTerminal("Connected to ESP32\n");

listenToSerial();

}catch(error){
alert("Connection failed: "+error.message);
}
}

async function listenToSerial(){

try{

while(port.readable){

const { value, done } = await reader.read();

if(done){
break;
}

const text = decoder.decode(value);

updateTerminal(text);

}

}catch(error){
console.error("Error reading serial data: ", error);
}

}

async function sendCommand(){

const commandInput = document.getElementById("commandInput");

const command = commandInput.value.trim();

if(!command) return;

updateTerminal(`\n> ${command}`);

const data = encoder.encode(command+"\n");

await writer.write(data);

commandInput.value="";

hideSuggestions();

}

function handleKeyPress(event){

if(event.key==="Enter"){
sendCommand();
}

}

function updateTerminal(text){

const terminal=document.getElementById("terminal");

terminal.innerHTML+=text;

terminal.scrollTop=terminal.scrollHeight;

}

function showSuggestions(){

const input=document.getElementById("commandInput").value.toLowerCase();

const suggestionsBox=document.getElementById("suggestions");

suggestionsBox.innerHTML="";

if(!input){
suggestionsBox.style.display="none";
return;
}

const filteredCommands=commandList.filter(cmd=>cmd.startsWith(input));

if(filteredCommands.length===0){
suggestionsBox.style.display="none";
return;
}

filteredCommands.forEach(command=>{

const div=document.createElement("div");

div.classList.add("suggestion");

div.textContent=command;

div.onclick=()=>selectCommand(command);

suggestionsBox.appendChild(div);

});

suggestionsBox.style.display="block";

}

function selectCommand(command){

document.getElementById("commandInput").value=command;

hideSuggestions();

}

function hideSuggestions(){

document.getElementById("suggestions").style.display="none";

}

document.addEventListener("click",(event)=>{

if(!event.target.classList.contains("suggestion")){
hideSuggestions();
}

});

</script>

</body>
</html>
