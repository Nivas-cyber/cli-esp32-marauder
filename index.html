<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Web Serial Terminal</title>

<style>
body {
font-family:'Courier New', Courier, monospace;
background-color:#1e1e1e;
color:#fff;
margin:0;
padding:0;
text-align:center;
}

h1 {
color:#4CAF50;
margin:10px 0;
}

.container {
max-width:800px;
margin:20px auto;
padding:20px;
background-color:#222;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.5);
position:relative;
}

.terminal {
width:100%;
height:300px;
background-color:#000;
color:#0f0;
padding:10px;
border-radius:5px;
overflow-y:auto;
text-align:left;
font-size:14px;
line-height:1.5;
border:1px solid #4CAF50;
white-space:pre-wrap;
}

.command-container {
position:relative;
width:100%;
}

.command-input {
width:100%;
padding:10px;
border-radius:5px;
border:1px solid #4CAF50;
background-color:#333;
color:#fff;
font-size:16px;
margin-top:10px;
}

.suggestions {
position:absolute;
width:100%;
background-color:#333;
border:1px solid #4CAF50;
color:white;
max-height:150px;
overflow-y:auto;
border-radius:5px;
display:none;
text-align:left;
}

.suggestion {
padding:10px;
cursor:pointer;
}

.suggestion:hover {
background-color:#4CAF50;
}

button {
background-color:#4CAF50;
color:white;
padding:10px;
font-size:16px;
border-radius:5px;
border:none;
cursor:pointer;
margin-top:10px;
}

button:hover {
background-color:#45a049;
}

.made-by {
color:red;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.credit {
background:linear-gradient(90deg, rgba(255,0,150,1) 0%, rgba(0,204,255,1) 100%);
-webkit-background-clip:text;
color:transparent;
font-size:18px;
font-weight:bold;
margin-top:5px;
}
</style>
</head>

<body>

<h1>ESP32 Web Serial Terminal</h1>

<div class="made-by">Made By @cyber_specterz</div>
<div class="credit">All Credit ESP32Marauder Team</div>

<div class="container">

<button onclick="connectSerial()">Connect to ESP32</button>

<div id="terminal" class="terminal">Waiting for connection...</div>

<div class="command-container">
<input type="text" id="commandInput" class="command-input" placeholder="Type a command..." oninput="showSuggestions()" onkeypress="handleKeyPress(event)">
<div id="suggestions" class="suggestions"></div>
</div>

<button onclick="sendCommand()">Send Command</button>

</div>

<script>

let port;
let writer;
let reader;

const decoder = new TextDecoder();
const encoder = new TextEncoder();

const terminal = document.getElementById("terminal");

const commandList = [
"help","scanap","stopscan","list -a","save -a 0",
"evilportal -c start","clearlist -a","attack -t deauth",
"blespam -t all","sniffraw","select -a",
"evilportal -c start -w apple.html",
"evilportal -c start -w Better_Google_Mobile.html",
"ssid -a -n Linuxndroid","reboot","select -s","ls /"
];

async function connectSerial(){

try{

port = await navigator.serial.requestPort();

await port.open({ baudRate:115200 });

writer = port.writable.getWriter();
reader = port.readable.getReader();

updateTerminal("Connected to ESP32\n");

listenToSerial();

}catch(error){

alert("Connection failed: "+error.message);

}

}

async function listenToSerial(){

try{

while(true){

const { value, done } = await reader.read();

if(done){
break;
}

if(value){

const text = decoder.decode(value);

updateTerminal(text);

}

}

}catch(error){

console.error("Serial error:", error);

updateTerminal("\n[Disconnected]\n");

}

}

async function sendCommand(){

if(!writer){

alert("Connect ESP32 first");

return;

}

const commandInput=document.getElementById("commandInput");

const command=commandInput.value.trim();

if(!command) return;

updateTerminal("\n> "+command);

await writer.write(encoder.encode(command+"\n"));

commandInput.value="";

hideSuggestions();

}

function handleKeyPress(event){

if(event.key==="Enter"){
sendCommand();
}

}

function updateTerminal(text){

terminal.textContent += text;

terminal.scrollTop = terminal.scrollHeight;

}

function showSuggestions(){

const input=document.getElementById("commandInput").value.toLowerCase();

const suggestionsBox=document.getElementById("suggestions");

suggestionsBox.innerHTML="";

if(!input){

suggestionsBox.style.display="none";

return;

}

const filtered=commandList.filter(cmd=>cmd.startsWith(input));

if(filtered.length===0){

suggestionsBox.style.display="none";

return;

}

filtered.forEach(command=>{

const div=document.createElement("div");

div.className="suggestion";

div.textContent=command;

div.onclick=()=>selectCommand(command);

suggestionsBox.appendChild(div);

});

suggestionsBox.style.display="block";

}

function selectCommand(command){

document.getElementById("commandInput").value=command;

hideSuggestions();

}

function hideSuggestions(){

document.getElementById("suggestions").style.display="none";

}

document.addEventListener("click",(event)=>{

if(!event.target.classList.contains("suggestion")){

hideSuggestions();

}

});

</script>

</body>
</html>
